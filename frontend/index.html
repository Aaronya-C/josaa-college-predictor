<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JoSAA Rank Predictor 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --josaa-blue: #003580;
      --josaa-blue-dark: #002560;
      --josaa-gold: #FFD700;
      --bg: #f0f2f5;
      --card: #ffffff;
      --border: #dde1e7;
      --text: #1a1a2e;
      --text-muted: #6b7280;
      --green: #1a8a4a;
      --amber: #b45309;
      --red: #c0392b;
      --radius: 8px;
      --radius-lg: 12px;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .site-header {
      background: var(--josaa-blue);
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo { font-size: 26px; font-weight: 700; color: var(--josaa-gold); letter-spacing: -1px; }
    .header-title { color: white; }
    .header-title .main { font-size: 14px; font-weight: 600; }
    .header-title .sub { font-size: 11px; opacity: 0.75; margin-top: 1px; }

    .main-layout {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 16px;
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 16px;
      align-items: start;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    .card-header {
      background: var(--josaa-blue);
      color: white;
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.03em;
    }
    .card-body { padding: 16px; }

    .form-group { margin-bottom: 13px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }
    input[type=number], select, input[type=text] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 13px;
      color: var(--text);
      background: #fafafa;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--josaa-blue);
      background: white;
    }
    .input-hint { font-size: 10px; color: var(--text-muted); margin-top: 3px; }

    .divider { height: 1px; background: var(--border); margin: 14px 0; }

    .btn-predict {
      width: 100%;
      padding: 11px;
      background: var(--josaa-blue);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 14px;
    }
    .btn-predict:hover { background: var(--josaa-blue-dark); }
    .btn-predict:disabled { background: #9ca3af; cursor: not-allowed; }

    .panel-placeholder, .loading-state {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 300px; gap: 12px; background: var(--card);
      border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-muted);
    }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--josaa-blue); border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results-meta {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 16px; border-bottom: 1px solid var(--border); gap: 8px;
    }
    .results-info { font-size: 13px; color: var(--text-muted); }
    .rank-pill {
      background: #e8f0fe; color: var(--josaa-blue); font-size: 12px;
      font-weight: 600; padding: 4px 12px; border-radius: 20px;
    }

    .filter-bar { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; gap: 6px; background: #fafbfc; }
    .ftab {
      padding: 5px 13px; border-radius: 20px; font-size: 12px; font-weight: 500;
      border: 1px solid var(--border); background: white; color: var(--text-muted); cursor: pointer;
    }
    .ftab.active { background: var(--josaa-blue); color: white; border-color: var(--josaa-blue); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 640px; }
    thead th { padding: 9px 12px; text-align: left; font-size: 11px; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border); }
    tbody tr { border-bottom: 1px solid #f1f3f5; }
    td { padding: 10px 12px; vertical-align: middle; }

    .inst-badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 4px; margin-bottom: 4px; }
    .badge-iit { background: #e8f0fe; color: #1a56c4; }
    .badge-nit { background: #e6f4ea; color: #1a7a3a; }
    .badge-iiit { background: #fce8e6; color: #b91c1c; }
    .badge-gfti { background: #f3f4f6; color: #4b5563; }
    
    .inst-name { font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.3; }
    .prog-name { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
    .closing-rank { font-size: 13px; font-weight: 600; color: var(--text); }
    
    .rank-diff { font-size: 10px; margin-top: 2px; }
    .rank-better { color: var(--green); }
    .rank-worse  { color: var(--red); }
    .rank-used-label { color: var(--text-muted); font-size: 10px; margin-top: 2px; }

    .prob-cell { min-width: 130px; }
    .prob-row { display: flex; align-items: center; gap: 8px; }
    .prob-track { flex: 1; height: 8px; background: #e5e7eb; border-radius: 4px; overflow: hidden; }
    .prob-fill { height: 100%; border-radius: 4px; }
    .fill-high  { background: var(--green); }
    .fill-mid   { background: #f59e0b; }
    .fill-low   { background: var(--red); }
    .prob-pct { font-size: 12px; font-weight: 700; min-width: 40px; text-align: right; }
    .pct-high { color: var(--green); }
    .pct-mid  { color: var(--amber); }
    .pct-low  { color: var(--red); }

    .error-state { padding: 24px; text-align: center; color: var(--red); font-size: 13px; }

    @media (max-width: 720px) { .main-layout { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<header class="site-header">
  <div class="header-left">
    <div class="logo">JoSAA</div>
    <div class="header-title">
      <div class="main">Joint Seat Allocation Authority — Rank Predictor</div>
      <div class="sub">IITs · NITs · IIITs · GFTIs · Academic Year 2026–27</div>
    </div>
  </div>
</header>

<div class="main-layout">
  <div>
    <div class="card">
      <div class="card-header">Target & Profile</div>
      <div class="card-body">
        
        <div class="form-group">
          <label>Target Institute Type *</label>
          <select id="inst-type" onchange="toggleInputs()">
            <option value="ALL">All Institutes</option>
            <option value="IIT">IITs only</option>
            <option value="NIT">NITs only</option>
            <option value="IIIT">IIITs only</option>
            <option value="GFTI">GFTIs only</option>
          </select>
        </div>
        
        <div class="divider"></div>

        <div class="form-group" id="mains-group">
          <label>JEE Mains Rank (CRL)</label>
          <input type="number" id="mains-rank" placeholder="Required for NITs, IIITs, GFTIs" min="1" />
        </div>
        
        <div class="form-group" id="adv-group">
          <label>JEE Advanced Rank</label>
          <input type="number" id="adv-rank" placeholder="Required for IITs" min="1" />
        </div>

        <div class="form-group" id="state-group">
          <label>Home State (For NITs / GFTIs) *</label>
          <select id="home-state">
            <option value="">-- Select Home State --</option>
            <option value="AP">Andhra Pradesh</option>
            <option value="AR">Arunachal Pradesh</option>
            <option value="AS">Assam</option>
            <option value="BR">Bihar</option>
            <option value="CG">Chhattisgarh</option>
            <option value="DL">Delhi</option>
            <option value="GA">Goa</option>
            <option value="GJ">Gujarat</option>
            <option value="HR">Haryana</option>
            <option value="HP">Himachal Pradesh</option>
            <option value="JK">Jammu & Kashmir</option>
            <option value="JH">Jharkhand</option>
            <option value="KA">Karnataka</option>
            <option value="KL">Kerala</option>
            <option value="LA">Ladakh</option>
            <option value="MP">Madhya Pradesh</option>
            <option value="MH">Maharashtra</option>
            <option value="MN">Manipur</option>
            <option value="ML">Meghalaya</option>
            <option value="MZ">Mizoram</option>
            <option value="NL">Nagaland</option>
            <option value="OD">Odisha</option>
            <option value="PY">Puducherry</option>
            <option value="PB">Punjab</option>
            <option value="RJ">Rajasthan</option>
            <option value="SK">Sikkim</option>
            <option value="TN">Tamil Nadu</option>
            <option value="TG">Telangana</option>
            <option value="TR">Tripura</option>
            <option value="UP">Uttar Pradesh</option>
            <option value="UK">Uttarakhand</option>
            <option value="WB">West Bengal</option>
          </select>
        </div>

        <div class="divider"></div>

        <div class="form-group">
          <label>Category (Seat Type) *</label>
          <select id="category">
            <option value="OPEN">OPEN</option>
            <option value="OBC-NCL">OBC-NCL</option>
            <option value="SC">SC</option>
            <option value="ST">ST</option>
            <option value="EWS">EWS</option>
            <option value="OPEN (PwD)">OPEN (PwD)</option>
            <option value="OBC-NCL (PwD)">OBC-NCL (PwD)</option>
            <option value="SC (PwD)">SC (PwD)</option>
            <option value="ST (PwD)">ST (PwD)</option>
            <option value="EWS (PwD)">EWS (PwD)</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>Gender *</label>
          <select id="gender">
            <option value="Gender-Neutral">Gender-Neutral</option>
            <option value="Female-only (including Supernumerary)">Female-only (incl. Supernumerary)</option>
          </select>
        </div>

        <div class="form-group">
          <label>Branch / Program (optional)</label>
          <input type="text" id="branch-filter" placeholder="e.g. Computer Science" />
        </div>
        
        <div class="form-group">
          <label>Results to show</label>
          <select id="top-n">
            <option value="20">Top 20</option>
            <option value="50" selected>Top 50</option>
            <option value="100">Top 100</option>
            <option value="ALL">All matching seats</option>
          </select>
        </div>
        
        <button class="btn-predict" id="predict-btn" onclick="runPrediction()">
          Predict Seat Allotment
        </button>
      </div>
    </div>
  </div>

  <div id="right-panel">
    <div class="panel-placeholder" id="placeholder">
      <div class="placeholder-icon">&#127979;</div>
      <div>Enter your rank and filters, then click Predict</div>
    </div>
  </div>
</div>

<script>
  const API = window.location.origin;
  let allResults = [];

  function toggleInputs() {
    const type = document.getElementById('inst-type').value;
    const mainsGroup = document.getElementById('mains-group');
    const advGroup = document.getElementById('adv-group');
    const stateGroup = document.getElementById('state-group');

    if (type === 'IIT') {
      mainsGroup.style.display = 'none';
      advGroup.style.display = 'block';
      stateGroup.style.display = 'none';
    } else if (type === 'NIT') {
      mainsGroup.style.display = 'block';
      advGroup.style.display = 'none';
      stateGroup.style.display = 'block';
    } else if (type === 'IIIT') {
      mainsGroup.style.display = 'block';
      advGroup.style.display = 'none';
      stateGroup.style.display = 'none';
    } else if (type === 'GFTI') {
      mainsGroup.style.display = 'block';
      advGroup.style.display = 'none';
      stateGroup.style.display = 'block';
    } else {
      mainsGroup.style.display = 'block';
      advGroup.style.display = 'block';
      stateGroup.style.display = 'block';
    }
  }

  document.addEventListener('DOMContentLoaded', toggleInputs);

  function showLoading() {
    document.getElementById('right-panel').innerHTML = `
      <div class="loading-state">
        <div class="spinner"></div>
        <div>Running model across all seats…</div>
      </div>`;
  }

  function showError(msg) {
    document.getElementById('right-panel').innerHTML = `
      <div class="card"><div class="error-state">&#9888;&#65039; ${msg}</div></div>`;
  }

  function badgeClass(t) {
    return { IIT:'badge-iit', NIT:'badge-nit', IIIT:'badge-iiit', GFTI:'badge-gfti' }[t] || 'badge-gfti';
  }

  function renderResults(data, filterLevel) {
    if (!data.length) {
      document.getElementById('right-panel').innerHTML = `
        <div class="card">
          <div class="error-state" style="color:var(--text-muted)">
            &#128269; No seats found matching your profile/ranks.
          </div>
        </div>`;
      return;
    }

    const counts = {
      ALL: allResults.length,
      HIGH: allResults.filter(r => r.prob >= 70).length,
      MID:  allResults.filter(r => r.prob >= 30 && r.prob < 70).length,
      LOW:  allResults.filter(r => r.prob < 30).length
    };

    const rows = data.map((r, i) => {
      const p = r.prob;
      const fillCls = p >= 70 ? 'fill-high' : p >= 30 ? 'fill-mid' : 'fill-low';
      const pctCls  = p >= 70 ? 'pct-high'  : p >= 30 ? 'pct-mid'  : 'pct-low';
      
      const diff = r.predicted_closing - r.rank_used;
      const diffHtml = diff > 0
        ? `<div class="rank-diff rank-better">&#9650; ${diff.toLocaleString()} better</div>`
        : `<div class="rank-diff rank-worse">&#9660; ${Math.abs(diff).toLocaleString()} worse</div>`;

      return `<tr>
        <td style="color:#9ca3af;font-size:11px;text-align:center;">${i+1}</td>
        <td>
          <div class="inst-badge ${badgeClass(r.inst_type)}">${r.inst_type}</div>
          <div class="inst-name">${r.institute}</div>
        </td>
        <td><div class="prog-name">${r.program}</div></td>
        <td style="font-size:12px;color:var(--text-muted);">${r.quota}</td>
        <td>
          <div class="closing-rank">${r.predicted_closing.toLocaleString()}</div>
          <div class="rank-used-label">vs ${r.rank_type}: ${r.rank_used.toLocaleString()}</div>
          ${diffHtml}
        </td>
        <td class="prob-cell">
          <div class="prob-row">
            <div class="prob-track">
              <div class="prob-fill ${fillCls}" style="width:${Math.round(p)}%"></div>
            </div>
            <span class="prob-pct ${pctCls}">${p.toFixed(1)}%</span>
          </div>
        </td>
      </tr>`;
    }).join('');

    const tabActive = (lvl) => filterLevel === lvl ? 'active' : '';

    document.getElementById('right-panel').innerHTML = `
      <div class="card">
        <div class="results-meta">
          <div class="results-info">Showing <strong>${data.length}</strong> possible seats</div>
          <div class="rank-pill">2026 Prediction Model</div>
        </div>

        <div class="filter-bar">
          <div class="ftab ${tabActive('ALL')}"  onclick="applyFilter('ALL')">All (${counts.ALL})</div>
          <div class="ftab ${tabActive('HIGH')}" onclick="applyFilter('HIGH')"> High chance >70% (${counts.HIGH})</div>
          <div class="ftab ${tabActive('MID')}"  onclick="applyFilter('MID')"> Moderate 30–70% (${counts.MID})</div>
          <div class="ftab ${tabActive('LOW')}"  onclick="applyFilter('LOW')"> Reach <30% (${counts.LOW})</div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th style="width:36px;">#</th>
                <th>Institute</th>
                <th>Program</th>
                <th>Quota</th>
                <th>Predicted Cutoff</th>
                <th>Probability</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
      </div>`;
  }

  function applyFilter(level) {
    let filtered = allResults;
    if (level === 'HIGH') filtered = allResults.filter(r => r.prob >= 70);
    else if (level === 'MID') filtered = allResults.filter(r => r.prob >= 30 && r.prob < 70);
    else if (level === 'LOW') filtered = allResults.filter(r => r.prob < 30);
    renderResults(filtered, level);
  }

  async function runPrediction() {
    const type = document.getElementById('inst-type').value;
    const mainsRank = document.getElementById('mains-rank').value;
    const advRank   = document.getElementById('adv-rank').value;
    const homeState = document.getElementById('home-state').value;
    
    if ((type === 'NIT' || type === 'GFTI' || type === 'ALL') && !homeState) {
        alert('Please select your Home State for NIT / GFTI predictions.'); return;
    }

    const btn = document.getElementById('predict-btn');
    btn.disabled = true;
    btn.textContent = 'Running model…';
    showLoading();

    try {
      const res = await fetch(`${API}/api/predict`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          mains_rank:    mainsRank || null,
          adv_rank:      advRank || null,
          category:      document.getElementById('category').value,
          gender:        document.getElementById('gender').value,
          home_state:    homeState,
          inst_type:     type,
          branch_filter: document.getElementById('branch-filter').value.trim(),
          top_n:         document.getElementById('top-n').value
        })
      });

      const data = await res.json();
      if (data.error) showError(data.error);
      else {
        allResults = data.results;
        renderResults(allResults, 'ALL');
      }
    } catch(e) {
      showError('Could not connect to the backend.');
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Predict Seat Allotment';
    }
  }
</script>
</body>
</html>
